name: Label PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    name: Labeler

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Label PR by files and patterns
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          configuration-path: .github/labeler.yml

      - name: Label by conventional commit
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const title = context.payload.pull_request.title;
            const labels = [];

            // Parse conventional commit types
            if (title.startsWith('feat')) labels.push('feature');
            if (title.startsWith('fix')) labels.push('bugfix');
            if (title.startsWith('perf')) labels.push('performance');
            if (title.startsWith('docs')) labels.push('documentation');
            if (title.startsWith('style')) labels.push('style');
            if (title.startsWith('refactor')) labels.push('refactor');
            if (title.startsWith('test')) labels.push('tests');
            if (title.startsWith('chore')) labels.push('maintenance');
            if (title.includes('!:')) labels.push('breaking-change');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
