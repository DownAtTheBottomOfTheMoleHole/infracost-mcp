name: Label PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    name: Labeler

    steps:
      - name: Label PR by files and patterns
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6
        with:
          configuration-path: .github/labeler.yml

      - name: Label by conventional commit
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const title = context.payload.pull_request.title;
            const labels = [];

            // Parse conventional commit types (type[optional scope][!]: ...)
            const conventionalCommitMatch = title.match(/^(feat|fix|perf|docs|style|refactor|test|chore)(\(.+\))?(!)?:/);

            if (conventionalCommitMatch) {
              const type = conventionalCommitMatch[1];
              const isBreakingChange = !!conventionalCommitMatch[3];

              const typeToLabel = {
                feat: 'feature',
                fix: 'bug',
                perf: 'maintenance',
                docs: 'documentation',
                style: 'style',
                refactor: 'refactor',
                test: 'test',
                chore: 'maintenance'
              };

              const label = typeToLabel[type];
              if (label) {
                labels.push(label);
              }

              if (isBreakingChange) {
                labels.push('breaking-change');
              }
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
