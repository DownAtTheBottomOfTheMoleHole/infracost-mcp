# GitHub PR Labeler Configuration
# Labels PRs based on file paths and patterns

breaking-change:
  - head-branch:
      - pattern: '.*breaking.*'
  - title:
      - pattern: '.*!:.*'

feature:
  - title:
      - pattern: '^feat(\(.+\))?:'
  - head-branch:
      - pattern: 'feature/.*'

bugfix:
  - title:
      - pattern: '^fix(\(.+\))?:'
  - head-branch:
      - pattern: 'fix/.*'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '*.md'
          - '.github/ISSUE_TEMPLATE/**'
          - '.github/pull_request_template.md'

test:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/**/*.test.ts'
          - '**/*.spec.ts'
          - 'vitest.config.ts'

configuration:
  - changed-files:
      - any-glob-to-any-file:
          - '.eslintrc.json'
          - '.markdownlint*.json'
          - 'cspell.json'
          - '.mega-linter.yml'
          - '.pre-commit-config.yaml'
          - 'renovate.json'
          - 'package.json'
          - 'package-lock.json'
          - 'vitest.config.ts'
          - 'tsconfig.json'
          - 'GitVersion.yml'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/labeler.yml'
