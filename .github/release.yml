changelog:
  categories:
    - title: ":boom: Breaking Changes"
      labels:
        - breaking-change
        - breaking
    - title: ":sparkles: Features and Enhancements"
      labels:
        - feature
        - enhancement
        - feat
        - performance
    - title: ":bug: Bug Fixes"
      labels:
        - bug
        - bugfix
        - fix
        - security
    - title: ":technologist: Developer Experience"
      labels:
        - ci
        - github-actions
        - workflow
        - tooling
        - test
        - developer-experience
    - title: ":memo: Documentation"
      labels:
        - documentation
        - docs
        - readme
    - title: ":arrow_up: Dependencies"
      labels:
        - dependencies
        - deps
        - renovate
    - title: ":wrench: Maintenance"
      labels:
        - maintenance
        - chore
        - style
        - refactor

exclude:
  labels:
    - duplicate
    - invalid
    - wontfix
    - skip-changelog
