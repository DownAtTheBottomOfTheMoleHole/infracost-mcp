# MegaLinter Configuration
# Comprehensive linting and compliance checking for the MCP server project
# Reference: https://megalinter.io/latest/configuration/

MEGALINTER_COMMENT: true
MEGALINTER_COMMENT_PR_REQUEST_CHANGES: true
GITHUB_COMMENT_PR_REQUEST_CHANGES: true

# Enable linters by language/format group
ENABLE:
  - MARKDOWN
  - JSON
  - YAML
  - TYPESCRIPT
  - BASH
  - SPELL

DISABLE_LINTERS:
  - TYPESCRIPT_STANDARD
  - YAML_V8R

# Disable specific linters for GitHub workflows (they have YAML frontmatter)
MARKDOWN_MARKDOWNLINT_DISABLED: false
MARKDOWN_MARKDOWNLINT_FILTER_REGEX_EXCLUDE: |
  \.github/(?:ISSUE_TEMPLATE|pull_request_template)\.md|LICENSE

# TypeScript linting
TYPESCRIPT_ES_TARGET: ES2022
TYPESCRIPT_ESLINT_CONFIG_FILE: eslint.config.js

# Spelling checker
SPELL_CSPELL_CONFIG_FILE: cspell.json
SPELL_CSPELL_FILE_EXTENSIONS:
  - .ts
  - .js
  - .json
  - .md
  - .yaml
  - .yml

SPELL_CSPELL_DISABLE_ERRORS: true

# Link checker - ignore dynamic URLs with shell variables and npm package checks
SPELL_LYCHEE_ARGUMENTS: "--exclude https://github.com/modelcontextprotocol/registry/releases/latest/download --exclude https://www.npmjs.com/package --exclude https://www.patreon.com/feross"

# Files to exclude from all linters
EXCLUDED_DIRECTORIES:
  - node_modules
  - dist
  - coverage
  - .git
  - .vscode
  - .tmp*

# Report configuration
REPORT_FOLDER: megalinter-reports
CREATE_SARIF_REPORT: true
CREATE_MARKDOWN_SUMMARY: true

# Timeout for linter execution (seconds)
LINTER_TIMEOUT: 60
